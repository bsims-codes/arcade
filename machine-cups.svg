<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180" fill="none" style="background:transparent">
  <!-- Arcade Cabinet - Orange/Red theme for Cup Shuffle -->

  <!-- Cabinet base/legs -->
  <rect x="15" y="160" width="20" height="20" fill="#7c2d12" rx="2"/>
  <rect x="85" y="160" width="20" height="20" fill="#7c2d12" rx="2"/>

  <!-- Main cabinet body -->
  <rect x="10" y="40" width="100" height="125" fill="#f97316" rx="4"/>

  <!-- Cabinet side shadow -->
  <rect x="100" y="40" width="10" height="125" fill="#ea580c" rx="0 4 4 0"/>

  <!-- Screen bezel -->
  <rect x="18" y="48" width="84" height="65" fill="#1e1e2e" rx="3"/>

  <!-- Screen -->
  <rect x="22" y="52" width="76" height="57" fill="#0f172a" rx="2"/>

  <!-- Screen glow effect -->
  <rect x="22" y="52" width="76" height="57" fill="url(#screenGlow-orange)" rx="2"/>

  <!-- Table surface -->
  <rect x="25" y="85" width="70" height="20" fill="#854d0e" opacity="0.4" rx="2"/>

  <!-- Cup 1 (left) -->
  <path d="M35 85 L32 70 L42 70 L39 85 Z" fill="#dc2626"/>
  <ellipse cx="37" cy="70" rx="5" ry="2" fill="#b91c1c"/>
  <ellipse cx="37" cy="85" rx="2" ry="1" fill="#991b1b"/>

  <!-- Cup 2 (center) -->
  <path d="M55 85 L52 70 L62 70 L59 85 Z" fill="#dc2626"/>
  <ellipse cx="57" cy="70" rx="5" ry="2" fill="#b91c1c"/>
  <ellipse cx="57" cy="85" rx="2" ry="1" fill="#991b1b"/>

  <!-- Cup 3 (right) -->
  <path d="M75 85 L72 70 L82 70 L79 85 Z" fill="#dc2626"/>
  <ellipse cx="77" cy="70" rx="5" ry="2" fill="#b91c1c"/>
  <ellipse cx="77" cy="85" rx="2" ry="1" fill="#991b1b"/>

  <!-- Ball hint -->
  <circle cx="57" cy="92" r="3" fill="#fbbf24" opacity="0.5"/>

  <!-- Question marks -->
  <text x="37" y="65" font-family="Arial" font-size="8" fill="#fef08a" text-anchor="middle">?</text>
  <text x="57" y="65" font-family="Arial" font-size="8" fill="#fef08a" text-anchor="middle">?</text>
  <text x="77" y="65" font-family="Arial" font-size="8" fill="#fef08a" text-anchor="middle">?</text>

  <!-- Marquee top -->
  <rect x="10" y="20" width="100" height="25" fill="#ea580c" rx="4 4 0 0"/>
  <rect x="10" y="20" width="100" height="8" fill="#fb923c" rx="4 4 0 0"/>

  <!-- Marquee text area -->
  <rect x="18" y="26" width="84" height="14" fill="#9a3412" rx="2"/>
  <text x="60" y="37" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#fed7aa" text-anchor="middle">CUP SHUFFLE</text>

  <!-- Control panel -->
  <rect x="18" y="118" width="84" height="40" fill="#9a3412" rx="3"/>

  <!-- Joystick base -->
  <ellipse cx="45" cy="138" rx="12" ry="8" fill="#0f172a"/>
  <ellipse cx="45" cy="136" rx="8" ry="5" fill="#334155"/>
  <!-- Joystick stick -->
  <rect x="43" y="125" width="4" height="12" fill="#1e293b" rx="2"/>
  <circle cx="45" cy="123" r="5" fill="#ef4444"/>

  <!-- Buttons -->
  <circle cx="75" cy="130" r="7" fill="#fbbf24"/>
  <circle cx="90" cy="135" r="7" fill="#f97316"/>

  <!-- Coin slot area -->
  <rect x="40" y="152" width="40" height="8" fill="#9a3412" rx="2"/>
  <rect x="52" y="154" width="16" height="4" fill="#0f172a" rx="1"/>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="screenGlow-orange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#c2410c;stop-opacity:0.2" />
    </linearGradient>
  </defs>
</svg>
