<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180" fill="none" style="background:transparent">
  <!-- Arcade Cabinet - Purple/Pink theme for Tink's Hex -->

  <!-- Cabinet base/legs -->
  <rect x="15" y="160" width="20" height="20" fill="#4a1942" rx="2"/>
  <rect x="85" y="160" width="20" height="20" fill="#4a1942" rx="2"/>

  <!-- Main cabinet body -->
  <rect x="10" y="40" width="100" height="125" fill="#9333ea" rx="4"/>

  <!-- Cabinet side shadow -->
  <rect x="100" y="40" width="10" height="125" fill="#7e22ce" rx="0 4 4 0"/>

  <!-- Screen bezel -->
  <rect x="18" y="48" width="84" height="65" fill="#1e1e2e" rx="3"/>

  <!-- Screen -->
  <rect x="22" y="52" width="76" height="57" fill="#0f172a" rx="2"/>

  <!-- Screen glow effect -->
  <rect x="22" y="52" width="76" height="57" fill="url(#screenGlow-purple)" rx="2"/>

  <!-- Hexagon decorations on screen -->
  <polygon points="45,65 55,60 65,65 65,75 55,80 45,75" fill="#c084fc" opacity="0.6"/>
  <polygon points="60,75 70,70 80,75 80,85 70,90 60,85" fill="#a855f7" opacity="0.5"/>
  <polygon points="30,78 38,74 46,78 46,86 38,90 30,86" fill="#e879f9" opacity="0.5"/>
  <polygon points="50,85 58,81 66,85 66,93 58,97 50,93" fill="#d946ef" opacity="0.4"/>

  <!-- Sparkle effects -->
  <circle cx="75" cy="60" r="2" fill="#fef08a"/>
  <circle cx="35" cy="68" r="1.5" fill="#fef08a"/>
  <circle cx="85" cy="88" r="1.5" fill="#fef08a"/>

  <!-- Marquee top -->
  <rect x="10" y="20" width="100" height="25" fill="#a855f7" rx="4 4 0 0"/>
  <rect x="10" y="20" width="100" height="8" fill="#c084fc" rx="4 4 0 0"/>

  <!-- Marquee text area -->
  <rect x="18" y="26" width="84" height="14" fill="#581c87" rx="2"/>
  <text x="60" y="37" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#e9d5ff" text-anchor="middle">TINK'S HEX</text>

  <!-- Control panel -->
  <rect x="18" y="118" width="84" height="40" fill="#581c87" rx="3"/>

  <!-- Joystick base -->
  <ellipse cx="45" cy="138" rx="12" ry="8" fill="#0f172a"/>
  <ellipse cx="45" cy="136" rx="8" ry="5" fill="#334155"/>
  <!-- Joystick stick -->
  <rect x="43" y="125" width="4" height="12" fill="#1e293b" rx="2"/>
  <circle cx="45" cy="123" r="5" fill="#ef4444"/>

  <!-- Buttons -->
  <circle cx="75" cy="130" r="7" fill="#ec4899"/>
  <circle cx="90" cy="135" r="7" fill="#8b5cf6"/>

  <!-- Coin slot area -->
  <rect x="40" y="152" width="40" height="8" fill="#581c87" rx="2"/>
  <rect x="52" y="154" width="16" height="4" fill="#0f172a" rx="1"/>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="screenGlow-purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#7e22ce;stop-opacity:0.2" />
    </linearGradient>
  </defs>
</svg>
