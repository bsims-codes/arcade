<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180" fill="none" style="background:transparent">
  <!-- Arcade Cabinet - Blue theme for Bubbles -->

  <!-- Cabinet base/legs -->
  <rect x="15" y="160" width="20" height="20" fill="#1a3a5c" rx="2"/>
  <rect x="85" y="160" width="20" height="20" fill="#1a3a5c" rx="2"/>

  <!-- Main cabinet body -->
  <rect x="10" y="40" width="100" height="125" fill="#2563eb" rx="4"/>

  <!-- Cabinet side shadow -->
  <rect x="100" y="40" width="10" height="125" fill="#1d4ed8" rx="0 4 4 0"/>

  <!-- Screen bezel -->
  <rect x="18" y="48" width="84" height="65" fill="#1e1e2e" rx="3"/>

  <!-- Screen -->
  <rect x="22" y="52" width="76" height="57" fill="#0f172a" rx="2"/>

  <!-- Screen glow effect -->
  <rect x="22" y="52" width="76" height="57" fill="url(#screenGlow-blue)" rx="2"/>

  <!-- Bubble decorations on screen -->
  <circle cx="40" cy="75" r="8" fill="#60a5fa" opacity="0.6"/>
  <circle cx="60" cy="85" r="10" fill="#3b82f6" opacity="0.5"/>
  <circle cx="80" cy="70" r="6" fill="#93c5fd" opacity="0.7"/>
  <circle cx="55" cy="65" r="5" fill="#60a5fa" opacity="0.5"/>
  <circle cx="75" cy="90" r="7" fill="#3b82f6" opacity="0.6"/>

  <!-- Marquee top -->
  <rect x="10" y="20" width="100" height="25" fill="#3b82f6" rx="4 4 0 0"/>
  <rect x="10" y="20" width="100" height="8" fill="#60a5fa" rx="4 4 0 0"/>

  <!-- Marquee text area -->
  <rect x="18" y="26" width="84" height="14" fill="#1e3a5f" rx="2"/>
  <text x="60" y="37" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#93c5fd" text-anchor="middle">BUBBLES</text>

  <!-- Control panel -->
  <rect x="18" y="118" width="84" height="40" fill="#1e3a5f" rx="3"/>

  <!-- Joystick base -->
  <ellipse cx="45" cy="138" rx="12" ry="8" fill="#0f172a"/>
  <ellipse cx="45" cy="136" rx="8" ry="5" fill="#334155"/>
  <!-- Joystick stick -->
  <rect x="43" y="125" width="4" height="12" fill="#1e293b" rx="2"/>
  <circle cx="45" cy="123" r="5" fill="#ef4444"/>

  <!-- Buttons -->
  <circle cx="75" cy="130" r="7" fill="#22c55e"/>
  <circle cx="90" cy="135" r="7" fill="#eab308"/>

  <!-- Coin slot area -->
  <rect x="40" y="152" width="40" height="8" fill="#1e3a5f" rx="2"/>
  <rect x="52" y="154" width="16" height="4" fill="#0f172a" rx="1"/>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="screenGlow-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.2" />
    </linearGradient>
  </defs>
</svg>
